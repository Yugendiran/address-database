<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Address Field Explorer · by country</title>
<style>
  :root{
    --bg:#f6f7f9; --panel:#ffffff; --panel-2:#fbfbfc; --ink:#1a1d21; --ink-soft:#5c6570;
    --line:#e6e8ec; --line-strong:#d4d8de; --accent:#3b6fe0; --accent-soft:#eaf0fd;
    --req:#d6455f; --up:#8a5cf6; --chip:#eef0f3; --shadow:0 1px 2px rgba(20,25,35,.05),0 8px 24px rgba(20,25,35,.06);
    --mono:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    --tok-N:#3b6fe0;--tok-O:#0e9f6e;--tok-A:#d97706;--tok-C:#7c3aed;--tok-S:#db2777;--tok-Z:#0891b2;--tok-D:#65a30d;--tok-X:#9333ea;--tok-L:#e11d48;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#0e1013; --panel:#16191e; --panel-2:#1b1f25; --ink:#e8eaed; --ink-soft:#9aa4b0;
      --line:#262b32; --line-strong:#333a43; --accent:#5b8bff; --accent-soft:#1a2438;
      --req:#ff6b83; --up:#b18cff; --chip:#222831; --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px rgba(0,0,0,.35);
    }
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:var(--sans);background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5}
  button{font-family:inherit}

  /* ---- shell ---- */
  .app{display:grid;grid-template-columns:340px 1fr;height:100vh}
  @media(max-width:820px){.app{grid-template-columns:1fr}.detail{display:none}.app.show-detail .list-pane{display:none}.app.show-detail .detail{display:flex}}

  /* ---- left pane ---- */
  .list-pane{border-right:1px solid var(--line);display:flex;flex-direction:column;background:var(--panel);min-height:0}
  .brand{padding:16px 18px 12px;border-bottom:1px solid var(--line)}
  .brand h1{margin:0;font-size:15px;font-weight:650;letter-spacing:-.01em;display:flex;align-items:center;gap:8px}
  .brand .glyph{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,var(--accent),#7c3aed);display:inline-grid;place-items:center;color:#fff;font-size:12px;font-weight:800}
  .brand p{margin:4px 0 0;color:var(--ink-soft);font-size:12px}
  .search-wrap{padding:12px 14px 8px}
  .search{position:relative}
  .search input{width:100%;padding:9px 12px 9px 32px;border:1px solid var(--line-strong);border-radius:9px;background:var(--panel-2);color:var(--ink);font-size:13px;outline:none}
  .search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.5}
  .filters{display:flex;flex-wrap:wrap;gap:6px;padding:2px 14px 10px}
  .chip{font-size:11.5px;padding:5px 10px;border-radius:999px;border:1px solid var(--line-strong);background:var(--chip);color:var(--ink-soft);cursor:pointer;user-select:none;transition:.12s}
  .chip:hover{color:var(--ink);border-color:var(--accent)}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .count-line{padding:0 16px 6px;font-size:11px;color:var(--ink-soft);letter-spacing:.02em}
  .list{overflow-y:auto;flex:1;padding:4px 8px 16px;min-height:0}
  .row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;cursor:pointer;position:relative}
  .row:hover{background:var(--panel-2)}
  .row.sel{background:var(--accent-soft)}
  .row.sel .r-name{color:var(--accent)}
  .flag{font-size:20px;width:24px;text-align:center;flex:none;line-height:1}
  .r-main{flex:1;min-width:0}
  .r-name{font-size:13.5px;font-weight:550;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .r-sub{font-size:11px;color:var(--ink-soft)}
  .r-dots{display:flex;gap:3px;flex:none}
  .dot{width:5px;height:5px;border-radius:50%;background:var(--line-strong)}
  .dot.req{background:var(--accent)}
  .empty{padding:30px 20px;text-align:center;color:var(--ink-soft);font-size:13px}

  /* ---- right pane ---- */
  .detail{overflow-y:auto;display:flex;flex-direction:column;min-height:0}
  .back{display:none}
  @media(max-width:820px){.back{display:inline-flex;align-items:center;gap:6px;margin:14px 0 0 16px;background:none;border:1px solid var(--line-strong);color:var(--ink);padding:6px 12px;border-radius:8px;cursor:pointer;font-size:13px}}
  .head{padding:26px 32px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .head .bigflag{font-size:44px;line-height:1}
  .head .h-txt h2{margin:0;font-size:22px;font-weight:680;letter-spacing:-.02em}
  .head .h-txt .meta{margin-top:3px;color:var(--ink-soft);font-size:12.5px;display:flex;gap:12px;flex-wrap:wrap}
  .head .h-txt .meta b{color:var(--ink);font-weight:600}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;padding:24px 32px 40px;align-items:start}
  @media(max-width:1080px){.grid{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
  .card h3{margin:0;padding:14px 18px;font-size:12px;font-weight:650;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-soft);border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .card .body{padding:18px}

  /* form preview */
  .field{margin-bottom:14px}
  .field:last-child{margin-bottom:0}
  .field label{display:block;font-size:12px;font-weight:600;margin-bottom:5px;color:var(--ink)}
  .field label .star{color:var(--req);margin-left:3px}
  .field label .tag{float:right;font-weight:600;font-size:10px;letter-spacing:.03em;color:var(--up);background:color-mix(in srgb,var(--up) 14%,transparent);padding:2px 6px;border-radius:5px}
  .field input{width:100%;padding:9px 11px;border:1px solid var(--line-strong);border-radius:8px;background:var(--panel-2);color:var(--ink);font-size:13px;outline:none;pointer-events:none}
  .field input.up{text-transform:uppercase;letter-spacing:.03em}
  .field .tokid{font-family:var(--mono);font-size:10px;color:var(--ink-soft);margin-left:6px;opacity:.7}
  .country-fld{opacity:.85}
  .admin-sep{margin:18px 0 12px;font-size:11px;font-weight:650;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft);border-top:1px solid var(--line);padding-top:14px}
  .admin-sep span{color:var(--accent);font-weight:600}
  .ac-field{margin-bottom:13px}
  .ac-field label{display:block;font-size:12px;font-weight:600;margin-bottom:5px;color:var(--ink)}
  .ac-badge{float:right;font-size:9.5px;font-weight:700;letter-spacing:.03em;padding:2px 6px;border-radius:5px;text-transform:uppercase}
  .ac-badge.select{color:var(--accent);background:var(--accent-soft)}
  .ac-badge.input{color:var(--ink-soft);background:var(--chip)}
  .ac-input{width:100%;padding:9px 11px;border:1px solid var(--line-strong);border-radius:8px;background:var(--panel-2);color:var(--ink);font-size:13px;outline:none;font-family:inherit}
  .ac-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .ac-input:disabled{opacity:.5;cursor:not-allowed}
  .ac-empty{font-size:12px;color:var(--ink-soft);font-style:italic}
  .ac-chain{font-size:12px;color:var(--ink-soft);margin-bottom:14px}
  .ac-chain b{color:var(--ink);font-weight:600}
  .ac-chain i{color:var(--accent);font-style:normal;margin:0 2px}
  .ac-lv{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--ink-soft);background:var(--chip);padding:1px 4px;border-radius:4px;margin-left:5px;vertical-align:1px}

  /* formatted address block */
  .addr-block{font-family:var(--mono);font-size:13px;line-height:1.7;white-space:pre-wrap;background:var(--panel-2);border:1px dashed var(--line-strong);border-radius:10px;padding:16px 18px;color:var(--ink)}
  .addr-block .lbl{color:var(--ink-soft)}

  /* format string tokens */
  .fmt{font-family:var(--mono);font-size:13px;line-height:2;word-break:break-word}
  .tok{padding:1px 5px;border-radius:5px;font-weight:600;color:#fff;margin:0 1px}
  .lit{color:var(--ink-soft)}
  .nl{color:var(--ink-soft);opacity:.5}
  .legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
  .legend span{font-size:11px;color:var(--ink-soft);display:inline-flex;align-items:center;gap:5px}
  .legend i{width:10px;height:10px;border-radius:3px;display:inline-block}
  .kv{display:flex;flex-wrap:wrap;gap:8px;margin-top:2px}
  .kv .pill{font-size:11.5px;background:var(--chip);border:1px solid var(--line);padding:4px 9px;border-radius:7px;color:var(--ink-soft)}
  .kv .pill b{color:var(--ink);font-weight:600}
  details.json{margin:0 32px 40px}
  details.json summary{cursor:pointer;font-size:12px;color:var(--ink-soft);font-weight:600;letter-spacing:.03em;text-transform:uppercase}
  details.json pre{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;overflow:auto;font-family:var(--mono);font-size:12px;color:var(--ink);margin-top:12px}
  .welcome{margin:auto;text-align:center;color:var(--ink-soft);padding:60px 30px;max-width:420px}
  .welcome .big{font-size:40px;margin-bottom:12px}
  .kbd{font-family:var(--mono);font-size:11px;border:1px solid var(--line-strong);border-bottom-width:2px;border-radius:5px;padding:1px 5px;color:var(--ink)}
</style>
</head>
<body>
<div class="app" id="app">
  <!-- LEFT -->
  <aside class="list-pane">
    <div class="brand">
      <h1><span class="glyph">A</span> Address Field Explorer</h1>
      <p>What each country collects in a postal address · <span id="totalCount">0</span> regions</p>
    </div>
    <div class="search-wrap">
      <div class="search">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
        <input id="search" type="text" placeholder="Search country or code…  ( / )" autocomplete="off" spellcheck="false">
      </div>
    </div>
    <div class="filters" id="filters">
      <button class="chip" data-f="postal">Requires postal code</button>
      <button class="chip" data-f="state">Has state / province</button>
      <button class="chip" data-f="landmark">Landmark fields</button>
    </div>
    <div class="count-line" id="countLine"></div>
    <div class="list" id="list"></div>
  </aside>
  <!-- RIGHT -->
  <main class="detail" id="detail">
    <div class="welcome" id="welcome">
      <div class="big">🌍</div>
      <h2 style="margin:0 0 8px;color:var(--ink)">Pick a country</h2>
      <p>See the exact fields, order, labels and required rules used to collect a mailing address there.<br><br>
      Press <span class="kbd">/</span> to search, <span class="kbd">↑</span><span class="kbd">↓</span> to move, <span class="kbd">Enter</span> to open.</p>
    </div>
  </main>
</div>

<script src="data.js"></script>
<script src="subregions-geonames/manifest.js"></script>
<script src="admin-levels.js"></script>
<script src="admin-control.js"></script>
<script>
(function(){
  const DATA = (window.ADDRESS_DATA||{}).countries||[];
  const byCode = Object.fromEntries(DATA.map(c=>[c.code,c]));

  // ----- helpers -----
  const REGIONAL = 0x1F1E6 - 65;
  function flag(code){
    if(!/^[A-Z]{2}$/.test(code)) return '🏳️';
    return String.fromCodePoint(REGIONAL+code.charCodeAt(0), REGIONAL+code.charCodeAt(1));
  }
  const TOKENMAP = { // token -> {key,color,sample}
    N:{c:'--tok-N',s:'Jordan Alvarez'}, O:{c:'--tok-O',s:'Globex Ltd'},
    A:{c:'--tok-A',s:'42 Rue Example'}, C:{c:'--tok-C',s:'Springfield'},
    S:{c:'--tok-S',s:'CA'}, Z:{c:'--tok-Z',s:'90210'}, D:{c:'--tok-D',s:'Riverside'},
    X:{c:'--tok-X',s:'CEDEX 7'}, T:{c:'--tok-L',s:'Near City Mall'},
    F:{c:'--tok-L',s:'Opposite'}, L:{c:'--tok-L',s:'Blue Tower'}
  };
  const KEY_SAMPLE = {recipient:'Jordan Alvarez',organization:'Globex Ltd',streetAddress:'42 Rue Example',
    locality:'Springfield',administrativeArea:'CA',postalCode:'90210',dependentLocality:'Riverside',
    sortingCode:'CEDEX 7',landmarkDescriptor:'Near City Mall',landmarkAffix:'Opposite',landmarkName:'Blue Tower'};

  function tokChar(field){ return field.token.replace('%',''); }

  // ----- filter/state -----
  const state = {q:'', filters:new Set(), sel:null, visible:[]};

  function passes(c){
    const q=state.q.trim().toLowerCase();
    if(q){
      if(!(c.name.toLowerCase().includes(q)||c.code.toLowerCase().includes(q))) return false;
    }
    for(const f of state.filters){
      if(f==='postal' && !c.fields.some(x=>x.key==='postalCode'&&x.required)) return false;
      if(f==='state'  && !c.fields.some(x=>x.key==='administrativeArea')) return false;
      if(f==='landmark' && !c.fields.some(x=>x.key.startsWith('landmark'))) return false;
    }
    return true;
  }

  // ----- render list -----
  const listEl=document.getElementById('list');
  const countLine=document.getElementById('countLine');
  function renderList(){
    const rows=DATA.filter(passes);
    state.visible=rows;
    countLine.textContent = rows.length+' of '+DATA.length+' shown';
    if(!rows.length){ listEl.innerHTML='<div class="empty">No countries match.</div>'; return; }
    listEl.innerHTML = rows.map(c=>{
      const dots=c.fields.slice(0,7).map(f=>'<span class="dot'+(f.required?' req':'')+'"></span>').join('');
      return `<div class="row${c.code===state.sel?' sel':''}" data-code="${c.code}" tabindex="0">
        <span class="flag">${flag(c.code)}</span>
        <span class="r-main"><div class="r-name">${c.name}</div>
        <div class="r-sub">${c.code} · ${c.fields.length} fields</div></span>
        <span class="r-dots" title="required = filled dot">${dots}</span></div>`;
    }).join('');
  }

  // ----- format string highlighter -----
  function renderFmt(fmt){
    let out='';
    for(let i=0;i<fmt.length;i++){
      if(fmt[i]==='%'){
        const t=fmt[i+1]; i++;
        if(t==='n'){ out+='<span class="nl">⏎\n</span>'; }
        else if(TOKENMAP[t]){ out+=`<span class="tok" style="background:var(${TOKENMAP[t].c})">%${t}</span>`; }
        else out+='%'+t;
      } else {
        out+=`<span class="lit">${fmt[i].replace('<','&lt;')}</span>`;
      }
    }
    return out;
  }

  // ----- formatted address sample -----
  function renderAddress(c){
    const lines=c.format.split('%n');
    return lines.map(line=>{
      let s=''; let has=false;
      for(let i=0;i<line.length;i++){
        if(line[i]==='%'){ const t=line[i+1]; i++;
          if(TOKENMAP[t]){ s+=TOKENMAP[t].s; has=true; } else s+=t;
        } else s+=line[i];
      }
      return has||s.trim()? s : null;
    }).filter(x=>x!==null).join('\n');
  }

  // ----- detail -----
  const detail=document.getElementById('detail');
  function renderDetail(code){
    const c=byCode[code]; if(!c) return;
    document.title=`${c.name} · Address Fields`;
    const langs=c.languages? c.languages.split('~').join(', ') : '—';
    const reqCount=c.fields.filter(f=>f.required).length;

    const formFields = c.fields.map(f=>{
      const up=f.uppercase?'<span class="tag">UPPERCASE</span>':'';
      return `<div class="field"><label>${f.label}${f.required?'<span class="star">*</span>':''}${up}
        <span class="tokid">${f.token}</span></label>
        <input class="${f.uppercase?'up':''}" value="${KEY_SAMPLE[f.key]||''}" readonly tabindex="-1"></div>`;
    }).join('');

    const legendToks=[...new Set(c.fields.map(tokChar))];
    const legend = legendToks.map(t=>TOKENMAP[t]?`<span><i style="background:var(${TOKENMAP[t].c})"></i>%${t} ${labelOf(c,t)}</span>`:'').join('');

    detail.innerHTML=`
      <button class="back" onclick="history.pushState(null,'','#');window.__closeDetail()">‹ All countries</button>
      <div class="head">
        <div class="bigflag">${flag(c.code)}</div>
        <div class="h-txt">
          <h2>${c.name}</h2>
          <div class="meta">
            <span><b>${c.code}</b> region code</span>
            <span><b>${c.fields.length}</b> fields · <b>${reqCount}</b> required</span>
            <span>Languages: <b>${langs}</b></span>
          </div>
        </div>
      </div>
      <div class="grid">
        <div class="card">
          <h3>Form preview <span style="text-transform:none;font-weight:500;color:var(--ink-soft)">in entry order</span></h3>
          <div class="body">
            <div class="field country-fld"><label>Country / region</label><input value="${c.name}" readonly tabindex="-1"></div>
            ${formFields}
            <div class="admin-sep">Administrative divisions <span>· live · Strategy B</span></div>
            <div id="adminMount" class="admin-mount"></div>
          </div>
        </div>
        <div>
          <div class="card" style="margin-bottom:22px">
            <h3>Formatted address</h3>
            <div class="body"><div class="addr-block">${renderAddress(c)||'<span class="lbl">(no format defined)</span>'}</div></div>
          </div>
          <div class="card">
            <h3>Format string</h3>
            <div class="body">
              <div class="fmt">${renderFmt(c.format)}</div>
              <div class="legend">${legend}</div>
              <div class="kv" style="margin-top:16px">
                <span class="pill">Required: <b>${c.requiredKeys.length?c.requiredKeys.join(', '):'—'}</b></span>
              </div>
            </div>
          </div>
        </div>
      </div>
      <details class="json"><summary>Raw metadata (JSON)</summary>
        <pre>${JSON.stringify(c,null,2).replace(/</g,'&lt;')}</pre></details>`;
    document.getElementById('app').classList.add('show-detail');
    if(window.AdminControl) AdminControl.build(c.code, document.getElementById('adminMount'));
  }

  function labelOf(c,t){ const f=c.fields.find(x=>tokChar(x)===t); return f?f.label:''; }

  window.__closeDetail=function(){ document.getElementById('app').classList.remove('show-detail'); };

  // ----- selection -----
  function select(code,push){
    state.sel=code;
    document.querySelectorAll('.row').forEach(r=>r.classList.toggle('sel',r.dataset.code===code));
    renderDetail(code);
    if(push!==false && location.hash!=='#'+code) history.pushState(null,'','#'+code);
    const row=document.querySelector('.row.sel'); if(row) row.scrollIntoView({block:'nearest'});
  }

  // ----- events -----
  const search=document.getElementById('search');
  search.addEventListener('input',()=>{ state.q=search.value; renderList(); });
  document.getElementById('filters').addEventListener('click',e=>{
    const b=e.target.closest('.chip'); if(!b) return;
    const f=b.dataset.f;
    if(state.filters.has(f)){state.filters.delete(f);b.classList.remove('on');}
    else{state.filters.add(f);b.classList.add('on');}
    renderList();
  });
  listEl.addEventListener('click',e=>{ const r=e.target.closest('.row'); if(r) select(r.dataset.code); });

  // keyboard
  document.addEventListener('keydown',e=>{
    if(e.key==='/' && document.activeElement!==search){ e.preventDefault(); search.focus(); search.select(); return; }
    if(e.key==='Escape'){ if(document.activeElement===search){search.blur();} }
    if((e.key==='ArrowDown'||e.key==='ArrowUp') && state.visible.length){
      e.preventDefault();
      let idx=state.visible.findIndex(c=>c.code===state.sel);
      idx = e.key==='ArrowDown'? Math.min(state.visible.length-1,idx+1) : Math.max(0,idx-1);
      if(idx<0)idx=0;
      select(state.visible[idx].code);
    }
  });

  window.addEventListener('hashchange',()=>{ const code=location.hash.slice(1); if(byCode[code]) select(code,false); });

  // ----- init -----
  document.getElementById('totalCount').textContent=DATA.length;
  renderList();
  const initial=location.hash.slice(1);
  if(byCode[initial]) select(initial,false);
})();
</script>
</body>
</html>
