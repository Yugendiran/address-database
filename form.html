<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Address Form · dynamic, validated, schema-mapped</title>
<style>
  :root{
    --bg:#f6f7f9;--panel:#fff;--panel-2:#fbfbfc;--ink:#1a1d21;--ink-soft:#5c6570;
    --line:#e6e8ec;--line-strong:#d4d8de;--accent:#3b6fe0;--accent-soft:#eaf0fd;
    --req:#d6455f;--req-soft:#fdeaee;--up:#8a5cf6;--chip:#eef0f3;--ok:#0e9f6e;--ok-soft:#e7f6ef;
    --shadow:0 1px 2px rgba(20,25,35,.05),0 8px 24px rgba(20,25,35,.06);
    --mono:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  @media(prefers-color-scheme:dark){:root{
    --bg:#0e1013;--panel:#16191e;--panel-2:#1b1f25;--ink:#e8eaed;--ink-soft:#9aa4b0;
    --line:#262b32;--line-strong:#333a43;--accent:#5b8bff;--accent-soft:#1a2438;
    --req:#ff6b83;--req-soft:#2a1720;--up:#b18cff;--chip:#222831;--ok:#34d399;--ok-soft:#132a20;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px rgba(0,0,0,.35);
  }}
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .topbar{position:sticky;top:0;z-index:5;background:var(--panel);border-bottom:1px solid var(--line);padding:14px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .topbar h1{margin:0;font-size:15px;font-weight:650;letter-spacing:-.01em;display:flex;align-items:center;gap:9px}
  .glyph{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,var(--accent),#7c3aed);display:inline-grid;place-items:center;color:#fff;font-weight:800;font-size:12px}
  .picker{margin-left:auto;display:flex;align-items:center;gap:8px}
  .flag{font-size:22px}
  select.country{font-family:inherit;font-size:13px;padding:8px 12px;border:1px solid var(--line-strong);border-radius:9px;background:var(--panel-2);color:var(--ink);min-width:240px;outline:none}
  select.country:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}

  .wrap{max-width:1180px;margin:0 auto;padding:24px 22px 70px;display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:start}
  @media(max-width:900px){.wrap{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
  .card h2{margin:0;padding:14px 18px;font-size:12px;font-weight:650;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-soft);border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:8px}
  .card h2 .sub{font-weight:500;text-transform:none;letter-spacing:0;color:var(--ink-soft);font-size:11.5px}
  .card .body{padding:18px}

  .field{margin-bottom:15px}
  .field:last-child{margin-bottom:0}
  .field label{display:block;font-size:12px;font-weight:600;margin-bottom:5px;color:var(--ink)}
  .field label .star{color:var(--req);margin-left:3px}
  .field label .kind{float:right;font-size:9.5px;font-weight:700;letter-spacing:.03em;padding:2px 6px;border-radius:5px;text-transform:uppercase}
  .field label .kind.select{color:var(--accent);background:var(--accent-soft)}
  .field label .kind.input{color:var(--ink-soft);background:var(--chip)}
  .field label .schemakey{font-family:var(--mono);font-weight:500;font-size:10px;color:var(--ink-soft);margin-left:6px;opacity:.7}
  .ctrl{width:100%;padding:9px 11px;border:1px solid var(--line-strong);border-radius:8px;background:var(--panel-2);color:var(--ink);font-size:13px;outline:none;font-family:inherit}
  .ctrl:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .ctrl:disabled{opacity:.5;cursor:not-allowed}
  textarea.ctrl{resize:vertical;min-height:44px}
  .ctrl.up{text-transform:uppercase}
  .field.invalid .ctrl{border-color:var(--req);background:var(--req-soft)}
  .err{color:var(--req);font-size:11px;margin-top:4px;display:none}
  .field.invalid .err{display:block}
  .hint{color:var(--ink-soft);font-size:11px;margin-top:4px}

  .meta-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .pill{font-size:11px;background:var(--chip);border:1px solid var(--line);border-radius:7px;padding:4px 9px;color:var(--ink-soft)}
  .pill b{color:var(--ink);font-weight:600}

  .actions{margin-top:18px;display:flex;gap:10px;align-items:center}
  button.primary{font-family:inherit;font-size:13px;font-weight:600;padding:10px 18px;border:0;border-radius:9px;background:var(--accent);color:#fff;cursor:pointer}
  button.primary:hover{filter:brightness(1.05)}
  button.ghost{font-family:inherit;font-size:13px;padding:10px 14px;border:1px solid var(--line-strong);border-radius:9px;background:var(--panel-2);color:var(--ink);cursor:pointer}
  .status{font-size:12.5px;font-weight:600}
  .status.ok{color:var(--ok)}
  .status.bad{color:var(--req)}

  pre.json{margin:0;font-family:var(--mono);font-size:12px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
  .json .k{color:var(--accent)}
  .json .s{color:var(--ok)}
  .json .empty{color:var(--ink-soft);opacity:.5}
  .addr{font-family:var(--mono);font-size:13px;line-height:1.7;white-space:pre-wrap;background:var(--panel-2);border:1px dashed var(--line-strong);border-radius:10px;padding:15px 17px;margin-top:6px;min-height:40px}
  .lbl{font-size:11px;font-weight:650;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft);margin:18px 0 8px}
</style>
</head>
<body>
  <div class="topbar">
    <h1><span class="glyph">✦</span> Dynamic Address Form</h1>
    <div class="picker">
      <span class="flag" id="flag">🌍</span>
      <select class="country" id="country" aria-label="Country"></select>
    </div>
  </div>

  <div class="wrap">
    <div class="card">
      <h2>Address form <span class="sub" id="formSub"></span></h2>
      <div class="body">
        <div class="meta-row" id="metaRow"></div>
        <form id="form" novalidate></form>
        <div class="actions">
          <button class="primary" id="save" type="button">Validate &amp; save</button>
          <button class="ghost" id="fill" type="button">Fill sample</button>
          <span class="status" id="status"></span>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Stored record <span class="sub">address-schema.json shape</span></h2>
      <div class="body">
        <pre class="json" id="json"></pre>
        <div class="lbl">Formatted (from country fmt)</div>
        <div class="addr" id="addr"></div>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="examples.js"></script>
  <script src="subregions-geonames/manifest.js"></script>
  <script src="admin-levels.js"></script>
  <script src="field-mapping.js"></script>
  <script src="postal-patterns.js"></script>
  <script src="form.js"></script>
</body>
</html>
